{{ define "main" }}
<article class="page-content">
    <div class="page-header">
        <h1>{{ .Title }}</h1>
        {{ if .Params.date }}
        <p class="page-date">{{ .Date.Format "January 2, 2006" }}</p>
        {{ end }}
    </div>
    
    <div class="page-body">
        {{ .Content }}
    </div>
    
    {{ if .NextInSection }}
    <nav class="page-nav">
        <a href="{{ .NextInSection.RelPermalink }}" class="nav-prev">← Previous</a>
    </nav>
    {{ end }}
</article>
{{ end }}
