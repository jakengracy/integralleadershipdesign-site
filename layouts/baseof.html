<!DOCTYPE html>
<html lang="en-CA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.description }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta name="author" content="Alexandra Salamis">
    <link rel="stylesheet" href="{{ .Site.BaseURL }}css/style.css">
    {{ if .Site.Params.favicon }}<link rel="icon" type="image/x-icon" href="{{ .Site.Params.favicon }}">{{ end }}
</head>
<body>
    {{ partial "header.html" . }}

    {{ if .IsHome }}
    <main>{{ block "main" . }}{{ end }}</main>
    {{ else }}
    <main class="l-main">{{ block "main" . }}{{ end }}</main>
    {{ end }}

    {{ partial "footer.html" . }}

    <script>
    // Mobile nav toggle
    document.querySelector('.nav-toggle').addEventListener('click', function() {
        document.querySelector('.nav-menu').classList.toggle('active');
    });
    </script>
</body>
</html>
