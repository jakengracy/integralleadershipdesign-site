<header class="l-header">
    <div class="header-inner">
        <div class="logo">
            <a href="{{ .Site.BaseURL }}">
                {{ if .Site.Params.logo }}
                <img src="{{ .Site.Params.logo }}" alt="{{ .Site.Title }}">
                {{ end }}
                <span class="logo-name">Integral Leadership Design</span>
            </a>
        </div>
        <nav class="w-nav">
            <button class="nav-toggle" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            {{ partial "nav.html" . }}
        </nav>
    </div>
</header>
