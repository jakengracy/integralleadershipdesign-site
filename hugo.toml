baseURL = "https://integralleadershipdesign.com/"
languageCode = "en-ca"
title = "Integral Leadership Design"

[params]
    description = "People Focused. Growth Oriented. Results Driven."
    # Homepage meta description (more specific than the tagline)
    homepage_description = "Alexandra Salamis is a certified leadership coach and change management consultant based in Ottawa, Ontario. Executive coaching, women's leadership programs, and corporate leadership development across Canada."
    tagline = "Lead with Clarity. Change with Confidence."
    email = "alexa@integralleadershipdesign.com"
    phone = "+1-613-795-9357"
    logo = "/img/logo.png"
    # Formspree form ID — replace YOUR_FORM_ID with the ID from your Formspree dashboard
    # Full endpoint will be: https://formspree.io/f/{formspree_id}
    formspree_id = "xzdjzbap"

    # ── Analytics ─────────────────────────────────────────────────────────────
    # Google Analytics 4 — Measurement ID from GA4 Data Stream
    ga4_id = "G-TQTQ006SKQ"

    # Cloudflare Web Analytics — get token from Cloudflare Dashboard
    # → integralleadershipdesign.com → Analytics → Web Analytics → Add Site
    # Leave empty to disable
    cloudflare_analytics_token = ""

    # Microsoft Clarity — get ID from clarity.microsoft.com after creating a project
    # Leave empty to disable
    clarity_id = "vtrvkqe47m"

[outputs]
    home = ["HTML"]

[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true
        [markup.goldmark.parser]
            # Prevents parser errors on long footnote-heavy articles
            wrapStandAloneImageWithinParagraph = false

